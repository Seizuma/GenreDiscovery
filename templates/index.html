<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genre Discovery</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <h1>Genre Discovery</h1>
        <input type="text" id="searchBar" class="search-bar" placeholder="Search genres...">
    </header>
    <div class="container">
        <div id="genreSections">
            <div class="grid" id="genreGrid">
                {% for genre in genres %}
                <div class="genre-card" onclick="window.location.href='/artists/{{ genre }}'">
                    <span>{{ genre }}</span>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
    <script>
        const searchBar = document.getElementById('searchBar');
        const genreGrid = document.getElementById('genreGrid');
        const genres = Array.from(genreGrid.children);

        searchBar.addEventListener('input', () => {
            const query = searchBar.value.toLowerCase();
            genres.forEach(genre => {
                genre.style.display = genre.textContent.toLowerCase().includes(query) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
