<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists in {{ genre }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>Popular Artists in {{ genre }}</h1>
        <div class="volume-control">
            <label for="volume">Volume:</label>
            <input type="range" id="volume" name="volume" min="0" max="100" value="50">
        </div>
        <a href="{{ url_for('index') }}" class="back-link">Back to genres</a>
    </div>
    <div id="player" style="display:none;">
        <audio id="audio-player" controls>
            <source id="audio-source" src="" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
    <div class="artist-list">
        {% for artist in artists %}
        <div class="artist clickable {{ 'major' if loop.index <= 5 else '' }} {{ 'no-preview' if not artist.preview_url }}"
            data-artist-id="{{ artist.id }}">
            <h2>{{ artist.name }}</h2>
            {% if not artist.preview_url %}
            <div class="no-preview-message">
                No preview available. <a href="{{ artist.external_urls.spotify }}" target="_blank">Listen on Spotify</a>
            </div>
            {% endif %}
        </div>
        {% endfor %}
    </div>

    <script>
        $(document).ready(function () {
            var currentPlayingArtist = null;

            $('.clickable').click(function () {
                var artistId = $(this).data('artist-id');
                if (currentPlayingArtist === artistId) {
                    $('#audio-player')[0].pause();
                    $('#player').hide();
                    currentPlayingArtist = null;
                } else {
                    $.get('/play/' + artistId, function (data) {
                        if (data.track) {
                            if (data.track.preview_url) {
                                $('#spotify-link').hide();
                                $('#audio-source').attr('src', data.track.preview_url);
                                $('#audio-player')[0].load();
                                $('#audio-player')[0].play();
                                currentPlayingArtist = artistId;
                            } else {
                                window.open(data.track.external_urls.spotify, '_blank');
                            }
                        } else {
                            alert("No tracks found for this artist.");
                        }
                    }).fail(function () {
                        console.error("Failed to fetch track for artist: " + artistId);
                    });
                }
            });

            $('#volume').on('input', function () {
                var volume = $(this).val();
                $('#audio-player')[0].volume = volume / 100;
            });
        });
    </script>
</body>
</html>
