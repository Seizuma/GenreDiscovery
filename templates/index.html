<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Genres</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <h1>Music Genres</h1>
    <ul>
        {% for genre in genres %}
        <li><a href="{{ url_for('play_genre', genre=genre) }}">{{ genre }}</a></li>
        {% endfor %}
    </ul>
</body>

</html>
